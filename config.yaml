# Project Configuration
# Knowledge Distillation for Lightweight Generative Language Models

data:
  dataset: "roneneldan/TinyStories"
  max_length: 512
  batch_size: 16
  max_samples_train: 30000  # Approx. 12h ROCm overnight run on RX 7700 XT
  max_samples_val: 1000

teacher:
  model_name: "gpt2"
  pretrained: true

student:
  vocab_size: 50257
  n_layers: 4
  n_heads: 4
  hidden_size: 256
  max_length: 512

training:
  epochs: 1
  student_baseline_epochs: 1
  lr: 5.0e-4
  weight_decay: 0.01
  use_amp: true
  save_path: "outputs/teacher.pt"

distillation:
  temperature: 1.5
  alpha: 0.3
  epochs: 3
  lr: 2.0e-4
  save_path: "outputs/student_distilled_t15_a03_lr2e4.pt"

generation:
  max_new_tokens: 100
  temperature: 1.0
  top_k: 50
  top_p: 0.95
